<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vcviz — vcpkg Registry Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>vcviz</h1>
      <span class="subtitle">vcpkg registry explorer</span>
    </div>
  </header>

  <main>
    <section class="url-bar">
      <div id="source-server" class="source-row">
        <label class="server-registry-label" for="server-registry-select">Server registry</label>
        <select id="server-registry-select">
          <option value="">— select a pre-configured registry —</option>
        </select>
      </div>
      <div id="drop-zone" class="drop-zone">
        <span class="drop-zone-text">or drop a local registry folder here</span>
      </div>
      <div id="local-banner" class="local-banner hidden">
        <span class="local-banner-icon">📁</span>
        <span id="local-banner-name" class="local-banner-name"></span>
        <button id="local-close" class="local-close" title="Close local registry">&times;</button>
      </div>
      <div id="url-error" class="error hidden"></div>
    </section>

    <section id="content" class="content hidden">
      <div class="panels">
        <!-- Ports list -->
        <div class="panel panel-ports">
          <div class="panel-header">
            <h2>Ports</h2>
            <input type="text" id="port-search" placeholder="Filter ports…" />
            <span id="port-count" class="badge"></span>
          </div>
          <ul id="port-list" class="port-list"></ul>
        </div>

        <!-- Port detail -->
        <div class="panel panel-detail">
          <div id="detail-placeholder" class="placeholder-text">
            Select a port to view details
          </div>
          <div id="port-detail" class="hidden">
            <div class="detail-header">
              <h2 id="detail-name"></h2>
              <span id="detail-version" class="version-badge"></span>
              <button id="view-deps-btn" class="view-deps-btn" title="View dependency graph">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/><line x1="6" y1="7" x2="10" y2="10"/><line x1="18" y1="7" x2="14" y2="10"/><line x1="6" y1="17" x2="10" y2="14"/><line x1="18" y1="17" x2="14" y2="14"/></svg>
                Dependencies
              </button>
            </div>
            <div id="detail-description" class="detail-description"></div>
            <div id="version-notice" class="version-notice hidden"></div>

            <div class="detail-sections">
              <div class="detail-section">
                <h3>Version History</h3>
                <div id="version-list" class="version-list"></div>
              </div>

              <div id="features-section" class="detail-section hidden">
                <h3>Features</h3>
                <div id="features-list" class="features-list"></div>
              </div>

              <div class="detail-section">
                <h3>Files</h3>
                <ul id="file-list" class="file-list"></ul>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Dependency graph overlay -->
  <div id="depgraph-overlay" class="depgraph-overlay hidden">
    <div class="depgraph-chrome">
      <div class="depgraph-toolbar">
        <div class="depgraph-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/><line x1="6" y1="7" x2="10" y2="10"/><line x1="18" y1="7" x2="14" y2="10"/><line x1="6" y1="17" x2="10" y2="14"/><line x1="18" y1="17" x2="14" y2="14"/></svg>
          <span>Dependencies of <strong id="depgraph-root-name"></strong></span>
        </div>
        <div class="depgraph-controls">
          <label class="depgraph-depth-label">
            Depth
            <input type="range" id="depgraph-depth" min="1" max="8" value="4" />
            <span id="depgraph-depth-val">4</span>
          </label>
          <button id="depgraph-hierarchy" class="depgraph-btn" title="Toggle hierarchy layout">Hierarchy</button>
          <button id="depgraph-recenter" class="depgraph-btn" title="Re-center">Re-center</button>
          <button id="depgraph-close" class="depgraph-btn depgraph-btn-close" title="Close">&times;</button>
        </div>
      </div>
      <div class="depgraph-legend">
        <span class="legend-item"><span class="legend-dot legend-root"></span>Root</span>
        <span class="legend-item"><span class="legend-dot legend-internal"></span>In registry</span>
        <span class="legend-item"><span class="legend-dot legend-external"></span>Not in registry</span>
      </div>
      <div id="depgraph-status" class="depgraph-status hidden"></div>
      <div id="depgraph-canvas" class="depgraph-canvas"></div>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <span id="loading-text">Loading…</span>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="app.js"></script>
  <script src="depgraph.js"></script>
</body>
</html>
